version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: wordpress-db
    restart: always
    env_file:
      - .env
    volumes:
      - /mnt/mysql-data:/var/lib/mysql
    networks:
      - wordpress-network

  wordpress:
    image: wordpress:latest
    container_name: wordpress-app
    restart: always
    ports:
      - "80:80"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - wordpress-network

networks:
  wordpress-network: